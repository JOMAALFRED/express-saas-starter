version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       saas_db
      POSTGRES_USER:     saas
      POSTGRES_PASSWORD: saas
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    ports: ["3000:3000"]
    environment:
      DATABASE_URL:      postgresql://saas:saas@postgres:5432/saas_db
      JWT_SECRET:        dev_secret_change_in_prod
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLIENT_URL:        http://localhost:5173
      TRIAL_DAYS:        14
      NODE_ENV:          development
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  pgdata:
